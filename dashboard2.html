<script>
/* ============ CONFIG & CHECKLIST DEFINITIONS ============ */
const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxITw3yQKYtCBlpwWoO3HcttaZ6DirtPt1_7DEe_OBj-GFLDwXrIjhM4rufyKaSnMcU2Q/exec";
const USE_GOOGLE_SHEETS = true;
const WEIGHTS = { chs: 0.35, pas: 0.35, ces: 0.30 };
const ALERT_THRESHOLD = 70;
const AVATAR_COLORS = ['bg-indigo-100 text-indigo-700','bg-emerald-100 text-emerald-700','bg-amber-100 text-amber-700','bg-rose-100 text-rose-700','bg-sky-100 text-sky-700','bg-violet-100 text-violet-700'];
const VIEWS = ['overview','qa-checklist','trends','leaderboard','consultants','alerts'];

const CHS_ITEMS = [
  'Sets clear call roadmap, agenda, and expectations early on',
  'Demonstrates genuine empathy & validates client goals/fears',
  'Value-first approach: helps client diagnose eligibility before selling',
  'Maintains chest register / authority tone without upspeak',
  'Controlled pace (130-150 WPM) with 3+ second silence discipline',
  'Handles interruptions smoothly via Stop-Freeze-Volume Drop',
  'Personalizes call by referencing client background & career history',
  'Acknowledges client objections warmly before countering'
];

const PAS_ITEMS = [
  'Intake form 100% complete and reviewed before starting call',
  'NOC code and job duties mapped accurately without discrepancy',
  'Eligibility stream/pathway evaluated correctly based on rules',
  'Document requirements (ECA, Language, Funds) explained accurately',
  'Fee structure and government charges disclosed transparently',
  'CRM call summary and next action items logged immediately',
  'Risk factors, timelines, and refund terms clearly communicated',
  'Follow-ups and SLA deadlines executed on schedule'
];

const CES_ITEMS = [
  'Bridges client personal pain points directly to service benefits',
  'Stacks service value completely before presenting price',
  'Handles price/timing objections using structured framework',
  'Creates genuine urgency based on age, points, or visa quotas',
  'Asks directly and confidently for deposit or payment commitment',
  'Offers structured payment plans when legitimate constraints exist',
  'Sends formal proposal or agreement within 2 hours of call',
  'Secures paid client commitment or hard-scheduled follow-up'
];

/* ============ STATE ============ */
let state = {
  period: 'today',
  currentView: 'overview',
  consultants: [
    { id: 'c1', name: 'Aiman', joinedDate: '2026-05-01', exitDate: '', certLevel: 'Consultant', status: 'Active' }
  ],
  entries: [],
  editingEntryId: null,
  editingConsultantId: null
};
let charts = {};

/* ============ SYNC & STORAGE LOGIC ============ */
function updateSyncStatus(text, color) {
  const el = document.getElementById('syncStatus');
  if (!el) return;
  const colors = {
    emerald: 'text-emerald-700 bg-emerald-50 border-emerald-200',
    amber: 'text-amber-700 bg-amber-50 border-amber-200',
    red: 'text-red-700 bg-red-50 border-red-200'
  };
  el.className = `flex items-center gap-1.5 text-xs px-2.5 py-1 rounded-full border ${colors[color] || ''}`;
  el.innerHTML = `<span class="w-2 h-2 rounded-full bg-current"></span>${text}`;
}

async function saveData() {
  updateSyncStatus('Syncing...', 'amber');
  localStorage.setItem('hof_qa_state_v3', JSON.stringify({ consultants: state.consultants, entries: state.entries }));

  if (!USE_GOOGLE_SHEETS || !GOOGLE_SCRIPT_URL) {
    updateSyncStatus('Saved locally', 'emerald');
    return;
  }
  try {
    await fetch(GOOGLE_SCRIPT_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ consultants: state.consultants, entries: state.entries })
    });
    updateSyncStatus('Synced Cloud', 'emerald');
  } catch (err) {
    updateSyncStatus('Saved locally (Offline)', 'amber');
  }
}

async function loadData() {
  updateSyncStatus('Loading...', 'amber');
  const local = localStorage.getItem('hof_qa_state_v3');
  if (local) {
    try {
      const parsed = JSON.parse(local);
      if (parsed.consultants) state.consultants = parsed.consultants;
      if (parsed.entries) state.entries = parsed.entries;
    } catch(e) {}
  }

  if (!USE_GOOGLE_SHEETS || !GOOGLE_SCRIPT_URL) {
    updateSyncStatus('Offline Mode', 'amber');
    renderCurrentView();
    return;
  }

  try {
    const res = await fetch(GOOGLE_SCRIPT_URL);
    const data = await res.json();
    if (data && (data.consultants || data.entries)) {
      state.consultants = data.consultants || state.consultants;
      state.entries = data.entries || state.entries;
      localStorage.setItem('hof_qa_state_v3', JSON.stringify(data));
    }
    updateSyncStatus('Cloud Synced', 'emerald');
  } catch (err) {
    updateSyncStatus('Local Mode', 'amber');
  }
  renderCurrentView();
}

/* ============ HELPERS ============ */
function todayISO(){ const d = new Date(); return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0'); }
function uid(prefix){ return prefix + '_' + Math.random().toString(36).slice(2,9); }
function pct(checks, total){ if(!total) return 0; return Math.round(((checks||[]).filter(Boolean).length / total) * 100); }
function chsScore(e){ return pct(e.chsChecks, CHS_ITEMS.length); }
function pasScore(e){ return pct(e.pasChecks, PAS_ITEMS.length); }
function cesScore(e){ return pct(e.cesChecks, CES_ITEMS.length); }
function composite(e){ return Math.round(chsScore(e)*WEIGHTS.chs + pasScore(e)*WEIGHTS.pas + cesScore(e)*WEIGHTS.ces); }
function initials(name){ return (name||'?').trim().split(/\s+/).map(w=>w[0]).slice(0,2).join('').toUpperCase(); }
function colorFor(id){ let h=0; for(const ch of String(id)) h=(h*31+ch.charCodeAt(0))>>>0; return AVATAR_COLORS[h % AVATAR_COLORS.length]; }
function consultantById(id){ return state.consultants.find(c=>c.id===id); }
function scoreColor(v){ return v>=90?'text-emerald-600':v>=75?'text-amber-600':'text-red-600'; }
function fmtDate(iso){ if(!iso) return ''; const d = new Date(iso+'T00:00:00'); return d.toLocaleDateString('en-US',{month:'short',day:'numeric'}); }
function esc(s){ return String(s??'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function avg(arr){ return arr.length? arr.reduce((a,b)=>a+b,0)/arr.length : 0; }

/* ============ TENURE & STATUS LOGIC ============ */
function calculateTenure(c) {
  if (!c || !c.joinedDate) return { tenureText: 'New', level: 'Non-Tenured 1', badgeColor: 'bg-slate-100 text-slate-700 border-slate-200' };
  
  const start = new Date(c.joinedDate + 'T00:00:00');
  const end = (c.exitDate) ? new Date(c.exitDate + 'T00:00:00') : new Date();
  const days = Math.max(0, Math.floor((end - start) / (1000 * 60 * 60 * 24)));
  const months = (days / 30.4375).toFixed(1);

  let level = 'Non-Tenured 1';
  let badgeColor = 'bg-slate-100 text-slate-800 border-slate-200';

  if (days >= 90) {
    level = 'Tenured';
    badgeColor = 'bg-emerald-100 text-emerald-800 border-emerald-200';
  } else if (days >= 30) {
    level = 'Non-Tenured 2';
    badgeColor = 'bg-amber-100 text-amber-800 border-amber-200';
  }

  const tenureText = c.exitDate ? `Served ${months}m` : `${months}m on floor`;
  return { days, months, level, badgeColor, tenureText };
}

function statusBadgeHtml(status) {
  const map = {
    'Active': '<span class="text-[10px] px-2 py-0.5 rounded-full bg-emerald-100 text-emerald-800 font-semibold border border-emerald-200">Active</span>',
    'PIP': '<span class="text-[10px] px-2 py-0.5 rounded-full bg-purple-100 text-purple-800 font-semibold border border-purple-200">PIP / Low Perf</span>',
    'Resigned': '<span class="text-[10px] px-2 py-0.5 rounded-full bg-amber-100 text-amber-800 font-semibold border border-amber-200">Resigned</span>',
    'Terminated': '<span class="text-[10px] px-2 py-0.5 rounded-full bg-red-100 text-red-800 font-semibold border border-red-200">Terminated</span>'
  };
  return map[status] || map['Active'];
}

function inPeriod(iso, period){
  if(period==='all') return true;
  const d = new Date(iso+'T00:00:00');
  const now = new Date(); now.setHours(0,0,0,0);
  if(period==='today') return iso === todayISO();
  if(period==='week'){
    const day = now.getDay();
    const diffToMonday = day===0 ? 6 : day-1;
    const start = new Date(now); start.setDate(now.getDate()-diffToMonday);
    return d>=start;
  }
  if(period==='month') return d.getFullYear()===now.getFullYear() && d.getMonth()===now.getMonth();
  return true;
}
function periodEntries(){ return state.entries.filter(e=>inPeriod(e.date, state.period)); }
function periodLabel(){ return state.period==='today'?'Today':state.period==='week'?'This Week':state.period==='month'?'This Month':'All Time'; }

/* ============ RENDER VIEWS ============ */
function switchView(view){
  state.currentView = view;
  VIEWS.forEach(v=>{
    document.getElementById('view-'+v).classList.toggle('hidden', v!==view);
    const btn = document.getElementById('nav-'+v);
    if(btn){
      if(v===view){ btn.classList.add('bg-indigo-50','text-indigo-700'); btn.classList.remove('text-slate-600'); }
      else { btn.classList.remove('bg-indigo-50','text-indigo-700'); btn.classList.add('text-slate-600'); }
    }
  });
  renderCurrentView();
}

function renderCurrentView(){
  const el = document.getElementById('view-'+state.currentView);
  if(!el) return;
  el.classList.add('fade-in');
  
  if (state.currentView === 'overview') renderOverview();
  else if (state.currentView === 'qa-checklist') renderQAChecklist();
  else if (state.currentView === 'trends') renderTrends();
  else if (state.currentView === 'leaderboard') renderLeaderboard();
  else if (state.currentView === 'consultants') renderConsultants();
  else if (state.currentView === 'alerts') renderAlerts();
  
  updateAlertBadge();
}

function openEntryModal(entryId = null) {
  state.editingEntryId = entryId;
  const select = document.getElementById('entryConsultant');
  select.innerHTML = state.consultants.map(c => `<option value="${c.id}">${esc(c.name)} (${c.status})</option>`).join('');

  document.getElementById('entryChecklistSections').innerHTML = 
    checklistSectionHtml('chs', 'I. Call Handling, Roadmap & Rapport (35%)', CHS_ITEMS, 'bg-blue-500') +
    checklistSectionHtml('pas', 'II. Process Adherence & Compliance (35%)', PAS_ITEMS, 'bg-emerald-500') +
    checklistSectionHtml('ces', 'III. Closing Effectiveness & Pitch (30%)', CES_ITEMS, 'bg-amber-500');

  if(entryId) {
    const e = state.entries.find(x => x.id === entryId);
    if(e) {
      document.getElementById('entryDate').value = e.date;
      select.value = e.consultantId;
      document.getElementById('entryCustomer').value = e.customerName || '';
      document.getElementById('entryProduct').value = e.product || '';
      document.getElementById('entryDealClosed').value = e.dealClosed || 'no';
      document.getElementById('entrySalesValue').value = e.salesValue || '';
      document.getElementById('entryNotes').value = e.notes || '';
      
      ['chs','pas','ces'].forEach(cat => {
        const checks = e[cat+'Checks'] || [];
        document.querySelectorAll(`input[data-cat="${cat}"]`).forEach((box, i) => { box.checked = !!checks[i]; });
      });
    }
  } else {
    document.getElementById('entryDate').value = todayISO();
    document.getElementById('entryCustomer').value = '';
    document.getElementById('entryProduct').value = '';
    document.getElementById('entryDealClosed').value = 'no';
    document.getElementById('entrySalesValue').value = '';
    document.getElementById('entryNotes').value = '';
  }

  updateCompositePreview();
  document.getElementById('entryModal').classList.remove('hidden');
}

function closeEntryModal() { document.getElementById('entryModal').classList.add('hidden'); }

function updateCompositePreview() {
  const getChecks = (cat) => Array.from(document.querySelectorAll(`input[data-cat="${cat}"]`)).map(i => i.checked);
  const chs = pct(getChecks('chs'), CHS_ITEMS.length);
  const pas = pct(getChecks('pas'), PAS_ITEMS.length);
  const ces = pct(getChecks('ces'), CES_ITEMS.length);
  
  if(document.getElementById('pct-chs')) document.getElementById('pct-chs').textContent = chs + '%';
  if(document.getElementById('pct-pas')) document.getElementById('pct-pas').textContent = pas + '%';
  if(document.getElementById('pct-ces')) document.getElementById('pct-ces').textContent = ces + '%';
  
  const comp = Math.round(chs * WEIGHTS.chs + pas * WEIGHTS.pas + ces * WEIGHTS.ces);
  document.getElementById('entryCompositePreview').textContent = comp + '%';
}

function submitEntry() {
  const getChecks = (cat) => Array.from(document.querySelectorAll(`input[data-cat="${cat}"]`)).map(i => i.checked);
  
  const entryData = {
    id: state.editingEntryId || uid('e'),
    date: document.getElementById('entryDate').value || todayISO(),
    consultantId: document.getElementById('entryConsultant').value,
    customerName: document.getElementById('entryCustomer').value,
    product: document.getElementById('entryProduct').value,
    dealClosed: document.getElementById('entryDealClosed').value,
    salesValue: document.getElementById('entrySalesValue').value || 0,
    chsChecks: getChecks('chs'),
    pasChecks: getChecks('pas'),
    cesChecks: getChecks('ces'),
    notes: document.getElementById('entryNotes').value
  };

  if(state.editingEntryId) {
    const idx = state.entries.findIndex(x => x.id === state.editingEntryId);
    if(idx !== -1) state.entries[idx] = entryData;
  } else {
    state.entries.unshift(entryData);
  }

  closeEntryModal();
  saveData();
  renderCurrentView();
}

function deleteEntry(id) {
  state.entries = state.entries.filter(e => e.id !== id);
  saveData();
  renderCurrentView();
}

/* ============ CONSULTANT LIFECYCLE HANDLERS ============ */
function openConsultantModal(consultantId = null) {
  state.editingConsultantId = consultantId;
  const title = document.getElementById('consultantModalTitle');
  
  if (consultantId) {
    const c = state.consultants.find(x => x.id === consultantId);
    if (c) {
      title.textContent = "Edit Consultant Profile";
      document.getElementById('consultantName').value = c.name || '';
      document.getElementById('consultantJoinedDate').value = c.joinedDate || todayISO();
      document.getElementById('consultantExitDate').value = c.exitDate || '';
      document.getElementById('consultantLevel').value = c.certLevel || 'Consultant';
      document.getElementById('consultantStatus').value = c.status || 'Active';
    }
  } else {
    title.textContent = "Add Consultant Profile";
    document.getElementById('consultantName').value = '';
    document.getElementById('consultantJoinedDate').value = todayISO();
    document.getElementById('consultantExitDate').value = '';
    document.getElementById('consultantLevel').value = 'Consultant';
    document.getElementById('consultantStatus').value = 'Active';
  }
  
  document.getElementById('consultantModal').classList.remove('hidden');
}

function closeConsultantModal() { 
  state.editingConsultantId = null;
  document.getElementById('consultantModal').classList.add('hidden'); 
}

function submitConsultant() {
  const name = document.getElementById('consultantName').value.trim();
  if(!name) return;
  
  const consultantData = {
    id: state.editingConsultantId || uid('c'),
    name: name,
    joinedDate: document.getElementById('consultantJoinedDate').value || todayISO(),
    exitDate: document.getElementById('consultantExitDate').value || '',
    certLevel: document.getElementById('consultantLevel').value,
    status: document.getElementById('consultantStatus').value
  };

  if (state.editingConsultantId) {
    const idx = state.consultants.findIndex(c => c.id === state.editingConsultantId);
    if (idx !== -1) state.consultants[idx] = consultantData;
  } else {
    state.consultants.push(consultantData);
  }

  closeConsultantModal();
  saveData();
  renderCurrentView();
}

function deleteConsultant(id) {
  const c = consultantById(id);
  if (confirm(`Remove consultant "${c ? c.name : ''}"? Historical QA data will remain.`)) {
    state.consultants = state.consultants.filter(x => x.id !== id);
    saveData();
    renderCurrentView();
  }
}

function exportReport() { window.print(); }

/* ============ INITIALIZATION ============ */
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('currentDate').textContent = new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  loadData();
});
</script>
